name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  draft-release:
    permissions:
      contents: write
    name: Draft Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: gh release create ${{ github.ref_name }} --verify-tag --draft --title ${{ github.ref_name }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github:
    permissions:
      id-token: write
      contents: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-linux
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: x86_64-windows
            host: windows-latest
            target: x86_64-pc-windows-gnu
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - shell: pwsh
        run: |
          cargo build --target=${{ matrix.target }} --release
          if (Test-Path ./target/${{ matrix.target }}/release/ci-playground.exe) {
            7z a ci-playground-${{ matrix.name }}.zip ./target/${{ matrix.target }}/release/ci-playground.exe
          }
          elseif (Test-Path ./target/${{ matrix.target }}/release/ci-playground) {
            7z a ci-playground-${{ matrix.name }}.zip ./target/${{ matrix.target }}/release/ci-playground
          }
          gh release upload ${{ github.ref_name }} ci-playground-${{ matrix.name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/attest@v4
        with:
          subject-path: ci-playground-${{ matrix.name }}.zip
